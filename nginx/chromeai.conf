worker_processes  1;
error_log  /usr/local/var/log/chromeai/nginx-error.log; 
pid        /usr/local/var/run/chromeai/nginx.pid;

events { worker_connections  1024; }

http {
    include       mime.types;
    default_type  application/json;
    sendfile        on;
    keepalive_timeout  65;

    map $http_origin $cors_origin {
        default "";
        ~^chrome-extension://.* $http_origin;
    }

    map $request_uri $nano_path {
        default         $request_uri;
    }

    set $nano_port "";
    include /usr/local/var/run/chromeai/port.info;

    if ($nano_port = "") { return 503; }
    if ($nano_port !~ ^80(8[0-9]|9[0-9]|100)$ ) { return 502; }

    upstream chromeai_upstream {
        server 127.0.0.1:$nano_port fail_timeout=0;
    }

    server {
        listen 80;
        server_name chromeai.local;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Content-Type application/json;

        if ($request_method = OPTIONS) { return 204; }

        location / {
            proxy_pass http://chromeai_upstream$nano_path;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}
