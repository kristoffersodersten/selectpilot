<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel">
    <header>
      <div>
        <div class="eyebrow">Privacy-first execution layer</div>
        <div class="title">SelectPilot</div>
      </div>
      <div class="tier" id="tier"></div>
    </header>
    <p class="lede">
      Highlight text, open the side panel, and turn it into structured output with your local Ollama setup.
    </p>
    <section class="actions">
      <button id="btn-extract">Extract JSON</button>
      <button id="btn-summarize">Summarize</button>
      <button id="btn-rewrite">Rewrite</button>
      <button id="btn-actions">Action brief</button>
      <button id="btn-ask">Ask Ollama</button>
    </section>
    <section class="extract-config">
      <label for="extract-preset">Structured extraction preset</label>
      <select id="extract-preset"></select>
      <p class="extract-help" id="extract-help"></p>
    </section>
    <section class="agent-prompt">
      <label for="agent-prompt">Custom prompt for rewrite / ask</label>
      <textarea id="agent-prompt" rows="4">Turn the selected text into a concise, practical output.</textarea>
    </section>
    <section class="workflow" id="workflow">
      <div class="empty-state">
        <strong>Ready for selected text.</strong>
        <span>Open a page, highlight content, then choose an action or a structured extraction preset.</span>
      </div>
    </section>
    <details class="advanced">
      <summary>Advanced tools</summary>
      <div class="advanced-grid">
        <button id="btn-transcribe">Transcribe</button>
        <button id="btn-vision">Vision OCR</button>
      </div>
    </details>
    <section class="exports" id="exports"></section>
    <section class="status-bar" id="status-bar"></section>
    <section class="status" id="status">Ready</section>
  </div>
  <script type="module" src="panel.js"></script>
</body>
</html>
