  <rect x="638" y="236" width="508" height="404" rx="24" fill="#FBFBFC" stroke="#E3E8EF"/>
  <text x="664" y="276" fill="#0F172A" font-family="SF Mono, Menlo, monospace" font-size="17">{</text>
