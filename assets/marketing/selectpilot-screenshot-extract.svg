<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="800" fill="#F3F5F8"/>
  <rect x="40" y="40" width="1200" height="720" rx="34" fill="rgba(255,255,255,0.86)" stroke="#DCE3ED" stroke-width="2"/>
  <text x="84" y="110" fill="#64748B" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="16" font-weight="700" letter-spacing="1.2">PRIMARY ACTION</text>
  <text x="84" y="160" fill="#0F172A" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="42" font-weight="600" letter-spacing="-1.6">Extract JSON from selected text</text>
  <text x="84" y="200" fill="#64748B" font-family="SF Pro Text, Avenir Next, Helvetica Neue, sans-serif" font-size="22">Readable output and reusable structure, generated locally.</text>

  <rect x="84" y="244" width="516" height="156" rx="24" fill="#FBFBFC" stroke="#E3E8EF"/>
  <text x="112" y="282" fill="#6B7280" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">SELECTION</text>
  <text x="112" y="324" fill="#0F172A" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="26" font-weight="600">We need a practical rollout plan for the next 30 days.</text>
  <text x="112" y="360" fill="#64748B" font-family="SF Pro Text, Avenir Next, Helvetica Neue, sans-serif" font-size="20">Highlight text, open SelectPilot, and turn it into a structured brief.</text>

  <rect x="84" y="430" width="180" height="54" rx="18" fill="#0F172A"/>
  <text x="126" y="464" fill="#F8FAFC" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="22" font-weight="600">Extract JSON</text>

  <rect x="640" y="116" width="556" height="560" rx="28" fill="rgba(255,255,255,0.92)" stroke="#D7DEE9" stroke-width="2"/>
  <rect x="668" y="146" width="500" height="62" rx="18" fill="#F7F8FA" stroke="#E3E8EF"/>
  <text x="690" y="184" fill="#64748B" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">READABLE / STRUCTURED</text>
  <rect x="668" y="234" width="500" height="414" rx="24" fill="#FBFBFC" stroke="#E3E8EF"/>
  <text x="696" y="272" fill="#6B7280" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">STRUCTURED RESULT</text>
  <text x="696" y="314" fill="#0F172A" font-family="SF Mono, Menlo, monospace" font-size="18">{</text>
  <text x="724" y="314" fill="#334155" font-family="SF Mono, Menlo, monospace" font-size="18">"summary": "Create a focused 30-day rollout",</text>
  <text x="724" y="348" fill="#334155" font-family="SF Mono, Menlo, monospace" font-size="18">"action_items": [</text>
  <text x="752" y="382" fill="#334155" font-family="SF Mono, Menlo, monospace" font-size="18">"Define one paid utility path",</text>
  <text x="752" y="416" fill="#334155" font-family="SF Mono, Menlo, monospace" font-size="18">"Record 60-second demo",</text>
  <text x="752" y="450" fill="#334155" font-family="SF Mono, Menlo, monospace" font-size="18">"Ship landing copy"</text>
  <text x="724" y="484" fill="#334155" font-family="SF Mono, Menlo, monospace" font-size="18">],</text>
  <text x="724" y="518" fill="#334155" font-family="SF Mono, Menlo, monospace" font-size="18">"risks": ["Scope drift", "Weak positioning"],</text>
  <text x="724" y="552" fill="#334155" font-family="SF Mono, Menlo, monospace" font-size="18">"follow_ups": ["Benchmark onboarding UX"]</text>
  <text x="696" y="586" fill="#0F172A" font-family="SF Mono, Menlo, monospace" font-size="18">}</text>

  <rect x="84" y="556" width="424" height="120" rx="24" fill="#FFFFFF" stroke="#D7DEE9" stroke-width="2"/>
  <text x="112" y="594" fill="#6B7280" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">WHY IT FEELS DIFFERENT</text>
  <text x="112" y="634" fill="#0F172A" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="24" font-weight="600">Not a chat wrapper.</text>
  <text x="112" y="668" fill="#64748B" font-family="SF Pro Text, Avenir Next, Helvetica Neue, sans-serif" font-size="20">It turns highlighted text into structure you can act on.</text>
</svg>
