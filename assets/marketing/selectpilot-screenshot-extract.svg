  <text x="96" y="110" fill="#6B7280" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">PRIMARY ACTION</text>
  <text x="96" y="160" fill="#0F172A" font-family="SF Pro Display, Avenir Next, Helvetica Neue, sans-serif" font-size="38" font-weight="600" letter-spacing="-1.2">Extract JSON from selected text</text>
  <text x="96" y="198" fill="#64748B" font-family="SF Pro Text, Avenir Next, Helvetica Neue, sans-serif" font-size="21">Readable output and reusable structure, generated locally.</text>

